<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor de Idiomas — Aprenda conversando</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #818cf8;
    --accent2: #6366f1;
    --positive: #34d399;
    --warning: #fbbf24;
    --error: #f87171;
    --track: rgba(255,255,255,0.06);
  }

  body {
    font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

  /* ── Animations ── */
  @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
  @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }

  /* ── API Key Screen ── */
  .setup-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
    padding: 20px;
  }
  .setup-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px 32px; max-width: 480px; width: 100%;
    backdrop-filter: blur(20px);
  }
  .setup-box h1 {
    font-family: 'Playfair Display', serif; font-size: 28px; text-align: center;
    background: linear-gradient(135deg, #e0e7ff, #c7d2fe, #a5b4fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .setup-box .sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .setup-box label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 500; }
  .setup-box input {
    width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .2s;
  }
  .setup-box input:focus { border-color: var(--accent); }
  .setup-box .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .setup-box .hint a { color: var(--accent); text-decoration: none; }
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 20px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .error-msg { color: var(--error); font-size: 12px; margin-top: 8px; }

  /* ── Language Select ── */
  .lang-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
    padding: 20px;
  }
  .lang-title { font-size: 48px; margin-bottom: 12px; }
  .lang-heading {
    font-family: 'Playfair Display', serif; font-size: clamp(28px,5vw,44px); font-weight: 700;
    background: linear-gradient(135deg, #e0e7ff, #c7d2fe, #a5b4fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;
  }
  .lang-sub { color: var(--muted); font-size: 16px; margin-top: 8px; font-weight: 300; letter-spacing: 1px; }
  .lang-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px; max-width: 640px; width: 100%; margin-top: 48px;
  }
  .lang-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 12px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: all .3s; color: var(--text);
  }
  .lang-btn:hover {
    background: rgba(165,180,252,0.12); border-color: rgba(165,180,252,0.3);
    transform: translateY(-3px);
  }
  .lang-btn .flag { font-size: 32px; }
  .lang-btn .name { font-size: 14px; font-weight: 500; }
  .settings-link {
    position: fixed; top: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px; color: var(--muted);
    font-size: 12px; cursor: pointer; transition: all .2s; text-decoration: none;
  }
  .settings-link:hover { color: var(--text); border-color: var(--accent); }

  /* ── Main Layout ── */
  .app { display: flex; height: 100vh; width: 100%; }

  /* ── Chat Area ── */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .chat-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px;
  }
  .chat-header-title { font-weight: 600; font-size: 15px; }
  .chat-header-level {
    font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px;
  }
  .level-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }

  .mode-toggle {
    display: flex; background: var(--surface); border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 5px 12px; border-radius: 8px; border: none; font-size: 12px;
    cursor: pointer; font-weight: 500; transition: all .2s; font-family: inherit;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .mode-btn:not(.active) { background: transparent; color: var(--muted); }

  .mobile-panel-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 10px; cursor: pointer; color: var(--text); font-size: 14px;
    display: none;
  }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg-row { display: flex; animation: fadeSlide .3s ease-out; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg-bubble {
    max-width: 78%; padding: 10px 16px; border-radius: 18;
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg-row.user .msg-bubble {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border-bottom-right-radius: 4px;
  }
  .msg-row.assistant .msg-bubble {
    background: var(--surface2);
    border-bottom-left-radius: 4px;
  }
  .typing-indicator {
    padding: 12px 20px; border-radius: 18px; border-bottom-left-radius: 4px;
    background: var(--surface2); display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  }
  .typing-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
  .typing-dot:nth-child(2) { animation: bounce 1.2s ease-in-out .15s infinite; }
  .typing-dot:nth-child(3) { animation: bounce 1.2s ease-in-out .3s infinite; }

  /* Input */
  .input-area {
    padding: 12px 20px; border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .input-wrap {
    display: flex; gap: 8px; align-items: center;
    background: var(--surface); border-radius: 14px; padding: 4px 4px 4px 16px;
    border: 1px solid var(--border); transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: rgba(129,140,248,0.4); }
  .input-wrap input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; padding: 8px 0; font-family: inherit;
  }
  .send-btn {
    background: var(--accent); border: none; border-radius: 10px; padding: 8px 16px;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .send-btn:disabled { background: var(--surface2); opacity: .5; cursor: default; }

  /* ── Side Panel ── */
  .side-panel {
    width: 320px; border-left: 1px solid var(--border); display: flex; flex-direction: column;
    background: rgba(255,255,255,0.015); flex-shrink: 0; overflow: hidden;
  }
  .side-tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .side-tab {
    flex: 1; padding: 10px 4px; border: none; background: none; cursor: pointer;
    font-size: 11px; font-weight: 500; transition: all .2s; font-family: inherit;
    border-bottom: 2px solid transparent; color: var(--muted);
  }
  .side-tab.active { border-bottom-color: var(--accent); color: var(--text); }
  .side-content { flex: 1; overflow-y: auto; padding: 16px; }

  /* Feedback items */
  .fb-item {
    padding: 10px 12px; border-radius: 12px; margin-bottom: 8px;
    animation: fadeSlide .3s ease-out; border-left: 3px solid;
  }
  .fb-item.positive { background: rgba(52,211,153,0.08); border-left-color: var(--positive); }
  .fb-item.correction { background: rgba(251,191,36,0.08); border-left-color: var(--warning); }
  .fb-text { font-size: 12px; font-weight: 500; }
  .fb-detail { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

  /* Goals */
  .goal-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 10px; background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .goal-check {
    width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border);
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 11px; flex-shrink: 0;
    transition: all .2s;
  }
  .goal-check.done { background: var(--positive); border-color: var(--positive); }
  .goal-text { flex: 1; font-size: 12px; }
  .goal-text.done { text-decoration: line-through; opacity: .5; }
  .goal-remove {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px; opacity: .5;
  }
  .goal-add { display: flex; gap: 6px; margin-top: 8px; }
  .goal-add input {
    flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 12px; outline: none;
    font-family: inherit;
  }
  .goal-add button {
    padding: 8px 12px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
  }

  /* Progress */
  .progress-bar-track { background: var(--track); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .stat-card {
    padding: 12px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--border); text-align: center;
  }
  .stat-icon { font-size: 18px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--muted); }

  .level-card {
    padding: 16px; border-radius: 14px; background: var(--surface);
    border: 1px solid var(--border); margin-bottom: 16px; text-align: center;
  }
  .level-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .level-value { font-size: 24px; font-weight: 700; font-family: 'Playfair Display', serif; }

  /* Journal */
  .journal-entry {
    padding: 12px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--border); margin-bottom: 10px;
  }
  .journal-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .journal-date { font-size: 12px; font-weight: 600; }
  .journal-lang { font-size: 11px; color: var(--accent); }
  .journal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 11px; color: var(--muted); }

  .empty-state { text-align: center; padding: 40px 16px; color: var(--muted); }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .chart-container {
    background: var(--surface); border-radius: 10px; padding: 8px;
    border: 1px solid var(--border); margin-bottom: 12px;
  }
  .chart-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }

  .save-journal-btn {
    width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--accent); color: #fff; cursor: pointer;
    font-size: 12px; font-weight: 600; margin-bottom: 16px; font-family: inherit;
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .side-panel {
      position: fixed; right: -320px; top: 0; bottom: 0; z-index: 100;
      transition: right .3s ease; background: var(--bg) !important;
      box-shadow: none;
    }
    .side-panel.open {
      right: 0; box-shadow: -4px 0 24px rgba(0,0,0,0.5);
    }
    .mobile-panel-btn { display: flex !important; align-items: center; justify-content: center; }
    .mobile-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 99; display: none;
    }
    .mobile-overlay.open { display: block; }
    .lang-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const LANGUAGES = [
  { code: "en", name: "English", flag: "🇺🇸", greeting: "Hello! How are you doing today?" },
  { code: "es", name: "Español", flag: "🇪🇸", greeting: "¡Hola! ¿Cómo estás?" },
  { code: "fr", name: "Français", flag: "🇫🇷", greeting: "Bonjour ! Comment allez-vous ?" },
  { code: "de", name: "Deutsch", flag: "🇩🇪", greeting: "Hallo! Wie geht es Ihnen?" },
  { code: "ja", name: "日本語", flag: "🇯🇵", greeting: "こんにちは！お元気ですか？" },
  { code: "it", name: "Italiano", flag: "🇮🇹", greeting: "Ciao! Come stai?" },
  { code: "pt", name: "Português", flag: "🇧🇷", greeting: "Olá! Como você está?" },
  { code: "ko", name: "한국어", flag: "🇰🇷", greeting: "안녕하세요! 잘 지내세요?" },
  { code: "zh", name: "中文", flag: "🇨🇳", greeting: "你好！你好吗？" },
  { code: "ru", name: "Русский", flag: "🇷🇺", greeting: "Привет! Как дела?" },
  { code: "ar", name: "العربية", flag: "🇸🇦", greeting: "مرحباً! كيف حالك!" },
];

const DEFAULT_GOALS = {
  en: ["Dominar tempos verbais (present perfect, past simple)", "Expandir vocabulário do dia a dia", "Usar phrasal verbs corretamente", "Melhorar expressões idiomáticas"],
  es: ["Dominar conjugações do presente", "Vocabulário de comida e restaurante", "Usar ser vs estar corretamente"],
  fr: ["Praticar tempos verbais do passado", "Vocabulário do cotidiano", "Pronúncia e liaison"],
  de: ["Declinação de artigos", "Ordem das palavras na frase", "Vocabulário de viagem"],
  ja: ["Hiragana e Katakana", "Partículas básicas (は、が、を)", "Expressões do cotidiano"],
  it: ["Conjugações verbais regulares", "Vocabulário de comida italiana", "Pronomes e preposições"],
  pt: ["Tempos verbais do indicativo", "Expressões idiomáticas", "Vocabulário profissional"],
  ko: ["Hangul básico", "Partículas 은/는, 이/가", "Honoríficos básicos"],
  zh: ["Tons e pronúncia (Pinyin)", "Caracteres básicos (HSK1)", "Estrutura de frases"],
  ru: ["Alfabeto cirílico", "Casos nominativo e acusativo", "Verbos de movimento"],
  ar: ["Alfabeto árabe", "Pronomes pessoais", "Frases de saudação"],
};

const LEVELS = ["Iniciante", "Elementar", "Intermediário", "Avançado", "Fluente"];
const LEVEL_COLORS = ["#f97316", "#eab308", "#22c55e", "#3b82f6", "#a855f7"];

// ── State ──
let state = {
  screen: "setup", // setup | langSelect | chat
  apiKey: localStorage.getItem("tutor_api_key") || "",
  lang: null,
  mode: "casual",
  messages: [],
  input: "",
  loading: false,
  feedback: [],
  goals: [],
  newGoal: "",
  stats: { vocab: 0, grammar: 0, sessions: 0, streak: 0, wordsLearned: [0], grammarScores: [0], sessionLengths: [0] },
  level: 0,
  sideTab: "feedback",
  journal: [],
  mobilePanel: false,
  apiError: "",
};

if (state.apiKey) state.screen = "langSelect";

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── API ──
async function callClaude(messages, systemPrompt) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": state.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages,
    }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  return resp.json();
}

function buildSystemPrompt() {
  const goalsText = state.goals.map(g => `- ${g.text}${g.done ? " (concluído)" : ""}`).join("\n");
  return `You are a friendly, encouraging language tutor for ${state.lang.name}.
The student's current level is: ${LEVELS[state.level]}.
Mode: ${state.mode === "casual" ? "casual conversation" : "structured lesson"}.

LEARNING GOALS:
${goalsText}

RULES:
1. Always respond primarily in ${state.lang.name}, with brief Portuguese translations in parentheses for key phrases if the student is a beginner/elementary level.
2. Keep responses concise (2-4 sentences for conversation).
3. If in structured lesson mode, focus on teaching specific grammar/vocabulary aligned with the goals.
4. Gently correct any mistakes the student makes by incorporating the correct form naturally.
5. Adapt difficulty to the student's level.
6. Sometimes ask questions to keep the conversation going.
7. If the student writes in Portuguese, encourage them to try in ${state.lang.name} but still respond helpfully.

IMPORTANT: After your conversational response, add a section separated by "---FEEDBACK---" with a JSON object containing:
{
  "corrections": [{"original": "what they wrote", "corrected": "correct form", "explanation": "brief explanation in Portuguese"}],
  "positive": ["positive feedback points in Portuguese"],
  "vocabNew": ["new vocabulary words used"],
  "grammarScore": 0-100,
  "suggestedLevel": 0-4,
  "topicSuggestion": "next topic suggestion in Portuguese"
}`;
}

async function sendMessage() {
  if (!state.input.trim() || state.loading) return;
  const userMsg = state.input.trim();
  const newMsgs = [...state.messages, { role: "user", content: userMsg }];
  setState({ messages: newMsgs, input: "", loading: true });

  try {
    const history = newMsgs.slice(-10).map(m => ({ role: m.role, content: m.content }));
    const data = await callClaude(history, buildSystemPrompt());
    const fullText = data.content?.map(c => c.text || "").join("") || "Desculpe, houve um erro. Tente novamente!";

    let chatResponse = fullText;
    let feedbackData = null;

    if (fullText.includes("---FEEDBACK---")) {
      const parts = fullText.split("---FEEDBACK---");
      chatResponse = parts[0].trim();
      try {
        const jsonMatch = parts[1].match(/\{[\s\S]*\}/);
        if (jsonMatch) feedbackData = JSON.parse(jsonMatch[0]);
      } catch (e) {}
    }

    const updatedMsgs = [...newMsgs, { role: "assistant", content: chatResponse }];
    const updates = { messages: updatedMsgs, loading: false };

    if (feedbackData) {
      const newFb = [];
      if (feedbackData.corrections?.length) {
        feedbackData.corrections.forEach(c => {
          newFb.push({ type: "correction", text: `"${c.original}" → "${c.corrected}"`, detail: c.explanation });
        });
      }
      if (feedbackData.positive?.length) {
        feedbackData.positive.forEach(p => {
          newFb.push({ type: "positive", text: p });
        });
      }
      if (newFb.length) updates.feedback = [...newFb, ...state.feedback].slice(0, 30);

      const s = { ...state.stats };
      s.vocab += (feedbackData.vocabNew?.length || 0);
      s.grammar = feedbackData.grammarScore ?? s.grammar;
      s.wordsLearned = [...s.wordsLearned]; s.wordsLearned[s.wordsLearned.length - 1] = s.vocab;
      s.grammarScores = [...s.grammarScores]; s.grammarScores[s.grammarScores.length - 1] = s.grammar;
      s.sessionLengths = [...s.sessionLengths]; s.sessionLengths[s.sessionLengths.length - 1] = (s.sessionLengths[s.sessionLengths.length - 1] || 0) + 1;
      updates.stats = s;

      if (feedbackData.suggestedLevel !== undefined && feedbackData.suggestedLevel !== state.level) {
        updates.level = feedbackData.suggestedLevel;
      }
    }

    setState(updates);
  } catch (err) {
    setState({
      messages: [...newMsgs, { role: "assistant", content: `Erro: ${err.message}. Verifique sua chave de API e tente novamente. 🔄` }],
      loading: false,
    });
  }

  setTimeout(() => {
    const el = document.getElementById("chat-end");
    if (el) el.scrollIntoView({ behavior: "smooth" });
    const inp = document.getElementById("msg-input");
    if (inp) inp.focus();
  }, 50);
}

function selectLang(l) {
  setState({
    screen: "chat",
    lang: l,
    messages: [{ role: "assistant", content: l.greeting + "\n\nSou seu tutor de " + l.name + "! Vamos conversar — escreva em " + l.name + " e eu ajudarei você a melhorar. Pode começar quando quiser! 🎓" }],
    goals: (DEFAULT_GOALS[l.code] || []).map((g, i) => ({ id: i, text: g, done: false })),
    feedback: [],
    stats: { vocab: 0, grammar: 0, sessions: 1, streak: 1, wordsLearned: [0], grammarScores: [0], sessionLengths: [0] },
    level: 0,
    mobilePanel: false,
  });
}

function saveApiKey() {
  const key = state.apiKey.trim();
  if (!key.startsWith("sk-ant-")) {
    setState({ apiError: "A chave deve começar com sk-ant-..." });
    return;
  }
  localStorage.setItem("tutor_api_key", key);
  setState({ screen: "langSelect", apiError: "" });
}

function saveJournalEntry() {
  const entry = {
    date: new Date().toLocaleDateString("pt-BR"),
    lang: state.lang.name,
    messagesCount: state.messages.filter(m => m.role === "user").length,
    level: LEVELS[state.level],
    vocab: state.stats.vocab,
    grammar: state.stats.grammar,
    corrections: state.feedback.filter(f => f.type === "correction").length,
    positives: state.feedback.filter(f => f.type === "positive").length,
  };
  setState({ journal: [entry, ...state.journal] });
}

// ── Mini Chart SVG ──
function miniChart(data, color, height = 60) {
  if (!data || data.length < 2) return `<div style="height:${height}px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">Dados insuficientes</div>`;
  const max = Math.max(...data, 1);
  const w = 100 / data.length;
  let bars = "";
  data.forEach((v, i) => {
    const h = (v / max) * (height - 8);
    const op = (0.7 + (i / data.length) * 0.3).toFixed(2);
    bars += `<rect x="${i * w + w * 0.15}" y="${height - h}" width="${w * 0.7}" height="${h}" rx="2" fill="${color}" opacity="${op}"/>`;
  });
  return `<svg viewBox="0 0 100 ${height}" style="width:100%;height:${height}px" preserveAspectRatio="none">${bars}</svg>`;
}

function progressBar(value, max, color, label, size) {
  const pct = Math.min((value / max) * 100, 100);
  const h = size === "sm" ? "6px" : "10px";
  let html = `<div style="margin-bottom:${size === 'sm' ? 6 : 10}px">`;
  if (label) {
    html += `<div style="font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between"><span>${label}</span><span style="font-weight:600">${Math.round(pct)}%</span></div>`;
  }
  html += `<div class="progress-bar-track" style="height:${h}"><div class="progress-bar-fill" style="width:${pct}%;background:${color || 'var(--accent)'}"></div></div></div>`;
  return html;
}

// ── Render ──
function render() {
  const app = document.getElementById("app");

  // ── Setup Screen ──
  if (state.screen === "setup") {
    app.innerHTML = `
      <div class="setup-screen">
        <div class="setup-box">
          <div style="font-size:48px;text-align:center;margin-bottom:16px;animation:float 3s ease-in-out infinite">🌍</div>
          <h1>Tutor de Idiomas</h1>
          <p class="sub">Configure sua chave de API para começar</p>
          <label>Chave de API da Anthropic</label>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." value="${esc(state.apiKey)}">
          <div class="hint">
            Crie sua chave em <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>.<br>
            Sua chave fica salva apenas no seu navegador, com total segurança.
          </div>
          ${state.apiError ? `<div class="error-msg">${esc(state.apiError)}</div>` : ""}
          <button class="btn-primary" id="save-key-btn">Começar →</button>
        </div>
      </div>`;
    document.getElementById("api-key-input").addEventListener("input", e => { state.apiKey = e.target.value; });
    document.getElementById("api-key-input").addEventListener("keydown", e => { if (e.key === "Enter") saveApiKey(); });
    document.getElementById("save-key-btn").addEventListener("click", saveApiKey);
    return;
  }

  // ── Language Select ──
  if (state.screen === "langSelect") {
    app.innerHTML = `
      <a class="settings-link" id="settings-link">⚙️ API Key</a>
      <div class="lang-screen">
        <div style="text-align:center;margin-bottom:48px">
          <div class="lang-title" style="animation:float 3s ease-in-out infinite">🌍</div>
          <h1 class="lang-heading">Tutor de Idiomas</h1>
          <p class="lang-sub">Escolha um idioma para começar</p>
        </div>
        <div class="lang-grid">
          ${LANGUAGES.map((l, i) => `
            <button class="lang-btn" data-lang="${i}">
              <span class="flag">${l.flag}</span>
              <span class="name">${l.name}</span>
            </button>
          `).join("")}
        </div>
      </div>`;
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => selectLang(LANGUAGES[parseInt(btn.dataset.lang)]));
    });
    document.getElementById("settings-link").addEventListener("click", () => setState({ screen: "setup" }));
    return;
  }

  // ── Chat Screen ──
  const l = state.lang;
  const userMsgCount = state.messages.filter(m => m.role === "user").length;

  app.innerHTML = `
    <div class="mobile-overlay ${state.mobilePanel ? 'open' : ''}" id="mobile-overlay"></div>
    <div class="app">
      <div class="chat-area">
        <!-- Header -->
        <div class="chat-header">
          <div class="chat-header-left">
            <button class="back-btn" id="back-btn" title="Trocar idioma">${l.flag}</button>
            <div>
              <div class="chat-header-title">Tutor de ${l.name}</div>
              <div class="chat-header-level">
                <span class="level-dot" style="background:${LEVEL_COLORS[state.level]}"></span>
                ${LEVELS[state.level]}
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="mode-toggle">
              <button class="mode-btn ${state.mode === 'casual' ? 'active' : ''}" data-mode="casual">💬 Casual</button>
              <button class="mode-btn ${state.mode === 'structured' ? 'active' : ''}" data-mode="structured">📚 Lição</button>
            </div>
            <button class="mobile-panel-btn" id="mobile-toggle">📊</button>
          </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages-container">
          ${state.messages.map(m => `
            <div class="msg-row ${m.role}">
              <div class="msg-bubble" style="border-radius:18px;${m.role === 'user' ? 'border-bottom-right-radius:4px' : 'border-bottom-left-radius:4px'}">${esc(m.content)}</div>
            </div>
          `).join("")}
          ${state.loading ? `
            <div class="msg-row assistant">
              <div class="typing-indicator">
                <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
              </div>
            </div>
          ` : ""}
          <div id="chat-end"></div>
        </div>

        <!-- Input -->
        <div class="input-area">
          <div class="input-wrap">
            <input id="msg-input" placeholder="Escreva em ${l.name}..." value="${esc(state.input)}">
            <button class="send-btn" id="send-btn" ${state.loading || !state.input.trim() ? 'disabled' : ''}>➤</button>
          </div>
        </div>
      </div>

      <!-- Side Panel -->
      <div class="side-panel ${state.mobilePanel ? 'open' : ''}" id="side-panel">
        <div class="side-tabs">
          ${[["feedback","💡 Feedback"],["goals","🎯 Objetivos"],["progress","📈 Progresso"],["journal","📓 Diário"]].map(([tab, lbl]) => `
            <button class="side-tab ${state.sideTab === tab ? 'active' : ''}" data-tab="${tab}">${lbl}</button>
          `).join("")}
        </div>
        <div class="side-content">
          ${renderSideContent()}
        </div>
      </div>
    </div>`;

  // ── Event Listeners ──
  document.getElementById("back-btn").addEventListener("click", () => { saveJournalEntry(); setState({ screen: "langSelect" }); });
  document.getElementById("mobile-toggle")?.addEventListener("click", () => setState({ mobilePanel: !state.mobilePanel }));
  document.getElementById("mobile-overlay")?.addEventListener("click", () => setState({ mobilePanel: false }));

  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => setState({ mode: btn.dataset.mode }));
  });

  document.querySelectorAll(".side-tab").forEach(btn => {
    btn.addEventListener("click", () => setState({ sideTab: btn.dataset.tab }));
  });

  const msgInput = document.getElementById("msg-input");
  msgInput.addEventListener("input", e => { state.input = e.target.value; });
  msgInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); });
  document.getElementById("send-btn").addEventListener("click", sendMessage);

  // Goal listeners
  document.querySelectorAll(".goal-check").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = parseInt(btn.dataset.id);
      state.goals = state.goals.map(g => g.id === id ? { ...g, done: !g.done } : g);
      render();
    });
  });
  document.querySelectorAll(".goal-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      state.goals = state.goals.filter(g => g.id !== parseInt(btn.dataset.id));
      render();
    });
  });
  const goalInput = document.getElementById("new-goal-input");
  if (goalInput) {
    goalInput.addEventListener("input", e => { state.newGoal = e.target.value; });
    goalInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && state.newGoal.trim()) {
        state.goals.push({ id: Date.now(), text: state.newGoal.trim(), done: false });
        state.newGoal = "";
        render();
      }
    });
  }
  document.getElementById("add-goal-btn")?.addEventListener("click", () => {
    if (state.newGoal.trim()) {
      state.goals.push({ id: Date.now(), text: state.newGoal.trim(), done: false });
      state.newGoal = "";
      render();
    }
  });
  document.getElementById("save-journal-btn")?.addEventListener("click", saveJournalEntry);

  // Scroll to bottom
  setTimeout(() => {
    const el = document.getElementById("chat-end");
    if (el) el.scrollIntoView({ behavior: "smooth" });
    msgInput.focus();
  }, 30);
}

function renderSideContent() {
  if (state.sideTab === "feedback") {
    if (!state.feedback.length) {
      return `<div class="empty-state"><div class="icon">💬</div><p>Comece a conversar e o feedback aparecerá aqui em tempo real!</p></div>`;
    }
    return state.feedback.map(f => `
      <div class="fb-item ${f.type}">
        <div class="fb-text">${f.type === "positive" ? "✅ " : "📝 "}${esc(f.text)}</div>
        ${f.detail ? `<div class="fb-detail">${esc(f.detail)}</div>` : ""}
      </div>
    `).join("");
  }

  if (state.sideTab === "goals") {
    return `
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Objetivos adaptados ao seu nível (${LEVELS[state.level]})</div>
      ${state.goals.map(g => `
        <div class="goal-item">
          <button class="goal-check ${g.done ? 'done' : ''}" data-id="${g.id}">${g.done ? "✓" : ""}</button>
          <span class="goal-text ${g.done ? 'done' : ''}">${esc(g.text)}</span>
          <button class="goal-remove" data-id="${g.id}">×</button>
        </div>
      `).join("")}
      <div class="goal-add">
        <input id="new-goal-input" placeholder="Adicionar objetivo..." value="${esc(state.newGoal)}">
        <button id="add-goal-btn">+</button>
      </div>`;
  }

  if (state.sideTab === "progress") {
    const doneGoals = state.goals.filter(g => g.done).length;
    return `
      <div class="level-card">
        <div class="level-label">Nível Atual</div>
        <div class="level-value" style="color:${LEVEL_COLORS[state.level]}">${LEVELS[state.level]}</div>
        ${progressBar(state.level + 1, 5, LEVEL_COLORS[state.level], "", "sm")}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        ${[
          { label: "Vocabulário", value: state.stats.vocab, icon: "📚", color: "#818cf8" },
          { label: "Gramática", value: state.stats.grammar + "%", icon: "✍️", color: "#34d399" },
          { label: "Sessões", value: state.stats.sessions, icon: "🔥", color: "#f97316" },
          { label: "Mensagens", value: state.messages.filter(m => m.role === "user").length, icon: "💬", color: "#ec4899" },
        ].map(s => `
          <div class="stat-card">
            <div class="stat-icon">${s.icon}</div>
            <div class="stat-value" style="color:${s.color}">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        `).join("")}
      </div>
      <div class="chart-label">Vocabulário ao longo do tempo</div>
      <div class="chart-container">${miniChart(state.stats.wordsLearned, "#818cf8")}</div>
      <div class="chart-label">Pontuação de gramática</div>
      <div class="chart-container">${miniChart(state.stats.grammarScores, "#34d399")}</div>
      <div style="margin-top:16px">
        <div class="chart-label" style="margin-bottom:8px">Progresso dos Objetivos</div>
        ${progressBar(doneGoals, Math.max(state.goals.length, 1), "var(--positive)", `${doneGoals}/${state.goals.length} concluídos`)}
      </div>`;
  }

  if (state.sideTab === "journal") {
    return `
      <button class="save-journal-btn" id="save-journal-btn">📝 Salvar entrada da sessão</button>
      ${!state.journal.length ? `
        <div class="empty-state"><div class="icon">📓</div><p>Seu diário de aprendizado aparecerá aqui. Salve uma entrada ao final de cada sessão!</p></div>
      ` : state.journal.map(e => `
        <div class="journal-entry">
          <div class="journal-header">
            <span class="journal-date">${e.date}</span>
            <span class="journal-lang">${e.lang}</span>
          </div>
          <div class="journal-stats">
            <span>📊 Nível: ${e.level}</span>
            <span>💬 ${e.messagesCount} msgs</span>
            <span>📚 ${e.vocab} palavras</span>
            <span>✍️ Gramática: ${e.grammar}%</span>
            <span>📝 ${e.corrections} correções</span>
            <span>✅ ${e.positives} acertos</span>
          </div>
        </div>
      `).join("")}`;
  }
  return "";
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Initial render
render();
</script>
</body>
</html>
